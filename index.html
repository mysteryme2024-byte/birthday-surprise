<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday!</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    text-align:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    overflow:hidden;
}

.screen{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.active{
    display:flex;
}

button{
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    background:#ff4081;
    color:white;
}

h1{
    color:white;
    text-shadow:2px 2px 5px black;
}

img{
    width:250px;
    height:250px;
    object-fit:cover;
    border-radius:20px;
    box-shadow:0 0 20px white;
}

.heart{
    position:absolute;
    color:red;
    animation:float 6s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-100px);
    }
}

.cake{
    font-size:100px;
    animation:bounce 1s infinite;
}

@keyframes bounce{
    50%{transform:translateY(-20px);}
}
</style>
</head>

<body>

<audio autoplay loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div id="screen1" class="screen active">
    <h1>🎁 HEELLLOOOOO!!! 🎁</h1>
    <button onclick="nextStep()">Click Me</button>
</div>

<div id="screen2" class="screen">
    <h1>Are You Ready? 😍</h1>
    <button onclick="nextStep()">Click Again</button>
</div>

<div id="screen3" class="screen">
    <h1>Almost There... ❤️</h1>
    <button onclick="nextStep()">One More Click</button>
</div>

<div id="screen4" class="screen">
    <div class="cake">🎂</div>
    <h1>Happy Birthday, JEEEZEEEELLL!!!</h1>

    <img id="slideshow" src="photo1.jpg">

    <h2 style="color:white;">
        Wishing you happiness, success,
        love and countless blessings.
        May all your dreams come true!
    </h2>
</div>

<script>

let current=1;

function nextStep(){
    document.getElementById("screen"+current).classList.remove("active");
    current++;
    document.getElementById("screen"+current).classList.add("active");
}

let photos=[
"photo1.jpg",
"photo2.jpg",
"photo3.jpg",
"photo4.jpg",
"photo5.jpg",
"photo6.jpg",
"photo7.jpg",
"photo8.jpg",
"photo9.jpg",
"photo10.jpg",
"photo11.jpg"
];

let index=0;

setInterval(()=>{
    let img=document.getElementById("slideshow");
    if(img){
        index=(index+1)%photos.length;
        img.src=photos[index];
    }
},2500);

function createHeart(){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(20+Math.random()*30)+"px";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },6000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
